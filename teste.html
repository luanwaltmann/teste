<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Aula Prática - Listas e Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-principal">
        
        <section class="secao-beneficios">
            <h2>Nossos Diferenciais</h2>

            <div class="layout-flex">
                <img src="https://via.placeholder.com/300" alt="Imagem Ilustrativa" class="imagem-ajustada">
                
                <div class="conteudo-lista">
                    <ul class="lista-estilizada">
                        <li>Atendimento Personalizado</li>
                        <li>Preços Competitivos</li>
                        <li>Qualidade Garantida</li>
                        <li>Suporte 24 horas</li>
                    </ul>

                    <h3>Passo a Passo de Contratação</h3>
                    <ol type="A" class="lista-estilizada">
                        <li>Escolha o plano</li>
                        <li>Preencha os dados</li>
                        <li>Inicie o projeto</li>
                    </ol>
                </div>
            </div>
        </section>

    </div>

</body>
</html>
